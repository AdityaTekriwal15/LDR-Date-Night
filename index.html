<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Distance Game</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0D0A0E;
  --surface: #161118;
  --card: #1C1620;
  --border: rgba(255,255,255,0.07);
  --border-accent: rgba(220,160,130,0.3);
  --rose: #E8A898;
  --rose-deep: #C4705A;
  --gold: #D4AF80;
  --mist: rgba(255,255,255,0.55);
  --faint: rgba(255,255,255,0.18);
  --text: #F0EAE4;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  min-height: 100vh;
  background: var(--bg);
  color: var(--text);
  font-family: 'Jost', sans-serif;
  font-weight: 300;
  overflow-x: hidden;
}

/* ── AMBIENT BACKGROUND ── */
.ambient {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.18;
}

.orb1 {
  width: 500px; height: 500px;
  background: radial-gradient(circle, #C4705A, transparent);
  top: -100px; left: -100px;
  animation: drift1 18s ease-in-out infinite alternate;
}

.orb2 {
  width: 400px; height: 400px;
  background: radial-gradient(circle, #7A5080, transparent);
  bottom: -80px; right: -80px;
  animation: drift2 22s ease-in-out infinite alternate;
}

.orb3 {
  width: 300px; height: 300px;
  background: radial-gradient(circle, #D4AF80, transparent);
  top: 50%; left: 60%;
  animation: drift3 15s ease-in-out infinite alternate;
}

@keyframes drift1 { to { transform: translate(60px, 80px); } }
@keyframes drift2 { to { transform: translate(-40px, -60px); } }
@keyframes drift3 { to { transform: translate(-80px, 40px); } }

/* ── STARS ── */
.stars {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

/* ── LAYOUT ── */
.wrap {
  position: relative;
  z-index: 1;
  max-width: 560px;
  margin: 0 auto;
  padding: 3rem 1.25rem 5rem;
}

/* ── HEADER ── */
header {
  text-align: center;
  margin-bottom: 3rem;
  animation: fadeDown 1s ease both;
}

@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-20px); }
  to   { opacity: 1; transform: translateY(0); }
}

.eyebrow {
  font-size: 10px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 1rem;
  opacity: 0.8;
}

header h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(2.8rem, 8vw, 4rem);
  font-weight: 300;
  line-height: 1.1;
  color: var(--text);
  margin-bottom: 0.75rem;
}

header h1 em {
  font-style: italic;
  color: var(--rose);
}

.subtitle {
  font-size: 13px;
  color: var(--mist);
  letter-spacing: 0.05em;
  line-height: 1.7;
  margin-bottom: 0.5rem;
}

.dedication {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 14px;
  color: var(--gold);
  opacity: 0.7;
}

/* ── NAMES ── */
.names-strip {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 1rem;
  margin-bottom: 2.5rem;
  animation: fadeUp 0.8s 0.2s ease both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

.name-tag {
  background: var(--card);
  border: 1px solid var(--border-accent);
  border-radius: 100px;
  padding: 0.5rem 1.25rem;
  font-size: 13px;
  font-weight: 400;
  letter-spacing: 0.08em;
  color: var(--rose);
}

.name-sep {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.4rem;
  color: var(--gold);
  opacity: 0.5;
  font-style: italic;
}

/* ── PROGRESS ── */
.progress-wrap {
  margin-bottom: 2.5rem;
  animation: fadeUp 0.8s 0.3s ease both;
}

.progress-meta {
  display: flex;
  justify-content: space-between;
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--faint);
  margin-bottom: 8px;
}

.progress-track {
  height: 1px;
  background: var(--border);
  border-radius: 1px;
  overflow: visible;
  position: relative;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--rose-deep), var(--gold));
  border-radius: 1px;
  transition: width 0.6s cubic-bezier(.4,0,.2,1);
  position: relative;
}

.progress-dot {
  position: absolute;
  right: -3px;
  top: -3px;
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--gold);
  box-shadow: 0 0 8px var(--gold);
}

/* ── CARD ── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 2rem;
  margin-bottom: 1rem;
  animation: cardIn 0.45s cubic-bezier(.34,1.2,.64,1) both;
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border-accent), transparent);
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(20px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* ── PILL ── */
.pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  font-weight: 500;
  padding: 5px 14px;
  border-radius: 100px;
  margin-bottom: 1.25rem;
  border: 1px solid;
}

.pill-warm   { border-color: rgba(212,175,128,0.3); color: var(--gold); background: rgba(212,175,128,0.06); }
.pill-us     { border-color: rgba(232,168,152,0.3); color: var(--rose); background: rgba(232,168,152,0.06); }
.pill-flirty { border-color: rgba(196,112,90,0.4);  color: #E88C78;    background: rgba(196,112,90,0.08); }
.pill-reunion{ border-color: rgba(150,180,200,0.3); color: #90B4C8;    background: rgba(150,180,200,0.06); }

/* ── WHOSE TURN ── */
.whose-turn {
  font-size: 11px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--faint);
  margin-bottom: 1.5rem;
}

.whose-turn span {
  color: var(--gold);
  font-weight: 500;
}

/* ── DIVIDER ── */
.divider {
  border: none;
  border-top: 1px solid var(--border);
  margin: 1.5rem 0;
}

/* ── QUESTION CHOICE ── */
.choose-label {
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--faint);
  margin-bottom: 1rem;
}

.q-choices { display: flex; flex-direction: column; gap: 10px; margin-bottom: 1.5rem; }

.q-choice {
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 1.1rem 1.25rem;
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.15rem;
  font-weight: 300;
  font-style: italic;
  color: var(--mist);
  cursor: pointer;
  text-align: left;
  line-height: 1.5;
  transition: all 0.2s ease;
  width: 100%;
}

.q-choice:hover {
  border-color: var(--border-accent);
  background: rgba(232,168,152,0.05);
  color: var(--text);
  transform: translateX(4px);
}

.q-choice.selected {
  border-color: var(--rose);
  background: rgba(232,168,152,0.08);
  color: var(--text);
}

/* ── REVEALED QUESTION ── */
.question-reveal {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(1.3rem, 4vw, 1.6rem);
  font-style: italic;
  font-weight: 300;
  line-height: 1.6;
  color: var(--text);
  margin-bottom: 1.5rem;
  padding: 1.5rem;
  background: rgba(232,168,152,0.05);
  border: 1px solid var(--border-accent);
  border-radius: 14px;
  text-align: center;
}

/* ── ANSWERER TAG ── */
.answerer-tag {
  text-align: center;
  font-size: 12px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--rose);
  margin-bottom: 1.5rem;
}

.answerer-tag .aname {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.1rem;
  font-style: italic;
  font-weight: 400;
  letter-spacing: 0.05em;
  text-transform: none;
  display: block;
  margin-top: 4px;
  color: var(--gold);
}

/* ── BUTTONS ── */
.btn-row { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 1.5rem; }

button {
  font-family: 'Jost', sans-serif;
  font-size: 12px;
  font-weight: 400;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 11px 24px;
  border-radius: 100px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--mist);
  cursor: pointer;
  transition: all 0.2s;
}

button:hover {
  border-color: var(--border-accent);
  color: var(--text);
  transform: translateY(-2px);
}

button:active { transform: scale(0.97); }

.btn-primary {
  border-color: var(--rose-deep);
  background: rgba(196,112,90,0.12);
  color: var(--rose);
}

.btn-primary:hover {
  background: rgba(196,112,90,0.2);
  border-color: var(--rose);
  color: var(--text);
}

/* ── PLAYER SELECT ── */
.player-select {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 1rem;
}

.player-btn {
  padding: 1rem;
  border-radius: 14px;
  border: 1px solid var(--border);
  background: transparent;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
  font-family: 'Jost', sans-serif;
}

.player-btn .pb-label {
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--faint);
  margin-bottom: 4px;
}

.player-btn .pb-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.2rem;
  font-style: italic;
  color: var(--mist);
}

.player-btn:hover, .player-btn.active {
  border-color: var(--border-accent);
  background: rgba(232,168,152,0.06);
}

.player-btn.active .pb-name { color: var(--rose); }
.player-btn.active .pb-label { color: var(--gold); }

/* ── END SCREEN ── */
.end-wrap {
  text-align: center;
  padding: 1rem 0;
}

.end-glyph {
  font-family: 'Cormorant Garamond', serif;
  font-size: 4rem;
  color: var(--gold);
  margin-bottom: 1rem;
  display: block;
  animation: pulse 2s ease infinite;
}

@keyframes pulse {
  0%,100% { opacity: 1; }
  50% { opacity: 0.5; }
}

.end-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2.5rem;
  font-weight: 300;
  color: var(--text);
  margin-bottom: 0.5rem;
}

.end-title em { font-style: italic; color: var(--rose); }

.end-msg {
  font-size: 14px;
  color: var(--mist);
  line-height: 1.8;
  margin-bottom: 2rem;
  max-width: 380px;
  margin-left: auto;
  margin-right: auto;
}

/* ── MUSIC BUTTON ── */
.music-btn {
  position: fixed;
  bottom: 1.5rem;
  right: 1.5rem;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--card);
  border: 1px solid var(--border-accent);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  transition: all 0.2s;
  font-size: 18px;
  color: var(--gold);
  padding: 0;
  letter-spacing: 0;
  text-transform: none;
  font-family: inherit;
}

.music-btn:hover { transform: scale(1.1); border-color: var(--gold); }

/* ── FOOTER ── */
footer {
  text-align: center;
  margin-top: 4rem;
  font-size: 11px;
  color: var(--faint);
  letter-spacing: 0.1em;
  line-height: 1.8;
}

footer em {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  color: var(--rose);
  opacity: 0.7;
  font-size: 13px;
}
</style>
</head>
<body>

<div class="ambient">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<canvas class="stars" id="stars"></canvas>

<!-- Music (ambient lo-fi via a gentle tone oscillator — no external CDN needed) -->
<button class="music-btn" id="musicBtn" onclick="toggleMusic()" title="Toggle music">♪</button>

<div class="wrap">
  <header>
    <div class="eyebrow">✦ A game for two ✦</div>
    <h1>The <em>Distance</em> Game</h1>
    <p class="subtitle">Closing the gap, one question at a time</p>
    <p class="dedication">dedicated to my love, Lindsie ♡</p>
  </header>

  <div class="names-strip">
    <div class="name-tag">Aditya</div>
    <div class="name-sep">&</div>
    <div class="name-tag">Lindsie</div>
  </div>

  <div class="progress-wrap">
    <div class="progress-meta">
      <span id="prog-label">Round 1 of 10</span>
      <span id="prog-pct">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="prog" style="width:0%">
        <div class="progress-dot"></div>
      </div>
    </div>
  </div>

  <div id="main"></div>

  <footer>
    ✦ &nbsp; made with love &nbsp; ✦<br>
    <span style="font-size:10px;opacity:0.5;letter-spacing:0.05em">across every mile, still yours</span>
  </footer>
</div>

<script>
// ── ROUNDS DATA ──
// Each round: category, pill, two question pairs, and who answers
// answerer: 'Aditya' | 'Lindsie' | 'choose' (host picks at runtime)

const ROUNDS = [
  {
    cat: 'warm', pill: 'pill-warm', pillLabel: '✦ Warm Up',
    title: 'Let\'s begin',
    answerer: 'choose',
    pairs: [
      "What's the first thing that comes to mind when you think of me right now?",
      "Describe me in three words — but make them surprising."
    ]
  },
  {
    cat: 'us', pill: 'pill-us', pillLabel: '♡ Us',
    title: 'About us',
    answerer: 'choose',
    pairs: [
      "What's your favourite memory of us so far?",
      "What's something small I do that you secretly love?"
    ]
  },
  {
    cat: 'flirty', pill: 'pill-flirty', pillLabel: '✧ Flirty',
    title: 'Getting warmer',
    answerer: 'choose',
    pairs: [
      "What's the most attractive thing I've done without realising it?",
      "What outfit or look of mine lives rent-free in your head?"
    ]
  },
  {
    cat: 'reunion', pill: 'pill-reunion', pillLabel: '✈ Reunion',
    title: 'When we meet',
    answerer: 'choose',
    pairs: [
      "What's the very first thing you want to do when we're finally in the same room?",
      "What's a simple everyday thing you're most excited to do together in person?"
    ]
  },
  {
    cat: 'warm', pill: 'pill-warm', pillLabel: '✦ Playful',
    title: 'A little silly',
    answerer: 'choose',
    pairs: [
      "If you could teleport to me right now, where would we go for the next two hours?",
      "What would our perfect lazy day together look like, hour by hour?"
    ]
  },
  {
    cat: 'flirty', pill: 'pill-flirty', pillLabel: '✧ Flirtier',
    title: 'Turn it up',
    answerer: 'choose',
    pairs: [
      "What's something you want me to do the next time we're together — be specific.",
      "What do you think about when you miss me that way?"
    ]
  },
  {
    cat: 'us', pill: 'pill-us', pillLabel: '♡ Deep Us',
    title: 'What we have',
    answerer: 'choose',
    pairs: [
      "What's something about us that surprised you in the best way?",
      "When did you first think 'okay, this one is actually special'?"
    ]
  },
  {
    cat: 'reunion', pill: 'pill-reunion', pillLabel: '✈ Next Time',
    title: 'Planning ahead',
    answerer: 'choose',
    pairs: [
      "Describe the first morning we wake up together with no goodbye flight to catch.",
      "What's one place you want to take me the next time we're in the same city?"
    ]
  },
  {
    cat: 'flirty', pill: 'pill-flirty', pillLabel: '✧ Spicy',
    title: 'No holding back',
    answerer: 'choose',
    pairs: [
      "What's something you've thought about doing with me but haven't said out loud yet?",
      "What's a fantasy you'd only ever whisper?"
    ]
  },
  {
    cat: 'warm', pill: 'pill-warm', pillLabel: '✦ Final Round',
    title: 'Before we say goodnight',
    answerer: 'choose',
    pairs: [
      "Say the thing you always almost say but stop yourself from saying.",
      "What do you want the other person to know right now, in this moment?"
    ]
  }
];

// ── STATE ──
let ri = 0;
let phase = 'pick-player'; // 'pick-player' | 'pick-question' | 'answer'
let currentPlayer = null;
let selectedQ = null;

function n1() { return 'Aditya'; }
function n2() { return 'Lindsie'; }

function updateProgress() {
  const pct = Math.round((ri / ROUNDS.length) * 100);
  document.getElementById('prog').style.width = pct + '%';
  document.getElementById('prog-label').textContent = ri < ROUNDS.length
    ? `Round ${ri + 1} of ${ROUNDS.length}`
    : 'Complete ✦';
  document.getElementById('prog-pct').textContent = pct + '%';
}

function render() {
  updateProgress();
  const main = document.getElementById('main');

  if (ri >= ROUNDS.length) {
    renderEnd(main);
    return;
  }

  const r = ROUNDS[ri];

  if (phase === 'pick-player') {
    main.innerHTML = `
      <div class="card">
        <span class="pill ${r.pill}">${r.pillLabel}</span>
        <div class="whose-turn">Round ${ri + 1} — who's answering?</div>
        <div class="round-title" style="font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:300;font-style:italic;margin-bottom:1.5rem;color:var(--mist)">${r.title}</div>
        <hr class="divider">
        <div class="choose-label">Select who answers this round</div>
        <div class="player-select">
          <button class="player-btn" id="pb1" onclick="selectPlayer('Aditya')">
            <div class="pb-label">Player</div>
            <div class="pb-name">Aditya</div>
          </button>
          <button class="player-btn" id="pb2" onclick="selectPlayer('Lindsie')">
            <div class="pb-label">Player</div>
            <div class="pb-name">Lindsie</div>
          </button>
        </div>
        <div id="player-confirm"></div>
      </div>`;

  } else if (phase === 'pick-question') {
    main.innerHTML = `
      <div class="card">
        <span class="pill ${r.pill}">${r.pillLabel}</span>
        <div class="whose-turn">Answering this round: <span>${currentPlayer}</span></div>
        <hr class="divider">
        <div class="choose-label">Pick a question</div>
        <div class="q-choices">
          <button class="q-choice" id="qc0" onclick="selectQ(0, this)">${r.pairs[0]}</button>
          <button class="q-choice" id="qc1" onclick="selectQ(1, this)">${r.pairs[1]}</button>
        </div>
        <div id="q-confirm"></div>
      </div>`;

  } else if (phase === 'answer') {
    const q = r.pairs[selectedQ];
    main.innerHTML = `
      <div class="card">
        <span class="pill ${r.pill}">${r.pillLabel}</span>
        <div class="question-reveal">${q}</div>
        <div class="answerer-tag">
          <span>answering</span>
          <span class="aname">${currentPlayer}</span>
        </div>
        <div class="btn-row">
          <button class="btn-primary" onclick="nextRound()">Next round →</button>
        </div>
      </div>`;
  }
}

function selectPlayer(name) {
  currentPlayer = name;
  document.querySelectorAll('.player-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(name === 'Aditya' ? 'pb1' : 'pb2').classList.add('active');
  document.getElementById('player-confirm').innerHTML = `
    <div class="btn-row">
      <button class="btn-primary" onclick="goPickQuestion()">${name} answers — choose a question →</button>
    </div>`;
}

function goPickQuestion() {
  phase = 'pick-question';
  selectedQ = null;
  render();
}

function selectQ(idx, el) {
  selectedQ = idx;
  document.querySelectorAll('.q-choice').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('q-confirm').innerHTML = `
    <div class="btn-row">
      <button class="btn-primary" onclick="goAnswer()">Ask this one ✦</button>
    </div>`;
}

function goAnswer() {
  if (selectedQ === null) return;
  phase = 'answer';
  render();
}

function nextRound() {
  ri++;
  phase = 'pick-player';
  currentPlayer = null;
  selectedQ = null;
  render();
}

function renderEnd(main) {
  main.innerHTML = `
    <div class="card">
      <div class="end-wrap">
        <span class="end-glyph">♡</span>
        <div class="end-title">That's a wrap, <em>love</em></div>
        <p class="end-msg">
          Ten rounds. Ten little windows into each other.<br>
          The distance hasn't closed — but we both got a little closer tonight.
        </p>
        <div class="btn-row">
          <button class="btn-primary" onclick="resetGame()">Play again ✦</button>
        </div>
      </div>
    </div>`;
}

function resetGame() {
  ri = 0; phase = 'pick-player';
  currentPlayer = null; selectedQ = null;
  render();
}

// ── STARS ──
(function() {
  const canvas = document.getElementById('stars');
  const ctx = canvas.getContext('2d');
  let stars = [];

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  function initStars() {
    stars = [];
    for (let i = 0; i < 120; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.2,
        a: Math.random(),
        speed: 0.002 + Math.random() * 0.004
      });
    }
  }

  function drawStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      s.a += s.speed;
      const alpha = 0.1 + 0.35 * Math.abs(Math.sin(s.a));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,245,220,${alpha})`;
      ctx.fill();
    });
    requestAnimationFrame(drawStars);
  }

  window.addEventListener('resize', () => { resize(); initStars(); });
  resize();
  initStars();
  drawStars();
})();

// ── MUSIC PLAYER (Web Audio API + remote MP3) ──
let audioCtx = null;
let musicAudio = null;
let musicSource = null;
let musicPlaying = false;

const MUSIC_URL =
  "https://upload.wikimedia.org/wikipedia/commons/8/82/Nocturne_in_E_flat_major%2C_Op._9_no._2.mp3";

function buildMusic() {
  if (musicAudio) return;

  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  musicAudio = new Audio(MUSIC_URL);
  musicAudio.crossOrigin = "anonymous";
  musicAudio.loop = true;
  musicAudio.preload = "auto";

  const master = audioCtx.createGain();
  master.gain.setTargetAtTime(0.30, audioCtx.currentTime, 0.05);;
  master.connect(audioCtx.destination);

  musicSource = audioCtx.createMediaElementSource(musicAudio);
  musicSource.connect(master);
}

async function toggleMusic() {
  const btn = document.getElementById("musicBtn");
  if (!btn) return;

  try {
    if (!musicPlaying) {
      buildMusic();

      if (audioCtx.state === "suspended") {
        await audioCtx.resume();
      }

      await musicAudio.play();
      musicPlaying = true;
      btn.textContent = "⏸";
      btn.style.color = "var(--rose)";
    } else {
      musicAudio.pause();
      musicPlaying = false;
      btn.textContent = "♫";
      btn.style.color = "var(--gold)";
    }
  } catch (err) {
    console.error("Audio playback failed:", err);
  }
}

// ── INIT ──
render();
