<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Distance Game</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --rose: #e5989b;
  --deep-rose: #b56576;
  --cream: #fffaf5;
  --dark: #352f36;
  --glass: rgba(255, 255, 255, 0.7);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--cream);
  background-image: 
    radial-gradient(at 0% 0%, rgba(229, 152, 155, 0.1) 0px, transparent 50%),
    radial-gradient(at 100% 100%, rgba(223, 180, 140, 0.1) 0px, transparent 50%);
  color: var(--dark);
  font-family: 'Montserrat', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  padding: 1rem;
}

/* ── MINIMALIST TEXT BUTTON ── */
#sound-toggle {
  position: absolute;
  top: 1.5rem;
  right: 1.5rem;
  background: none;
  border: none;
  font-family: 'Montserrat', sans-serif;
  font-size: 0.6rem;
  letter-spacing: 0.25em;
  color: var(--deep-rose);
  cursor: pointer;
  text-transform: uppercase;
  font-weight: 400;
  opacity: 0.5;
  transition: opacity 0.3s ease;
  z-index: 9999;
}

#sound-toggle:hover { opacity: 1; }

.container { max-width: 550px; margin: auto; width: 100%; position: relative; padding-top: 2rem; }

header { text-align: center; margin-bottom: 3rem; }

header h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2rem, 8vw, 2.8rem);
  color: var(--deep-rose);
  font-weight: 700;
  margin-bottom: 0.4rem;
}

header .subtitle {
  font-size: 0.8rem;
  color: var(--rose);
  font-weight: 500;
  letter-spacing: 0.05em;
}

.names-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 2rem;
}

.name-input-wrap {
  background: var(--glass);
  border: 1px solid rgba(229, 152, 155, 0.15);
  border-radius: 8px;
  padding: 0.6rem 1rem;
}

.name-input-wrap label {
  display: block;
  font-size: 0.55rem;
  font-weight: 700;
  color: var(--deep-rose);
  text-transform: uppercase;
  margin-bottom: 2px;
}

.name-input-wrap input {
  border: none;
  background: transparent;
  font-family: 'Montserrat', sans-serif;
  font-size: 0.9rem;
  color: var(--dark);
  width: 100%;
  outline: none;
}

.progress-bar {
  height: 1px;
  background: rgba(229, 152, 155, 0.15);
  margin-bottom: 2.5rem;
}

.progress-fill {
  height: 100%;
  background: var(--deep-rose);
  width: 0%;
  transition: width 0.8s ease;
}

.card {
  background: white;
  border-radius: 20px;
  padding: 3rem 2rem;
  box-shadow: 0 15px 40px rgba(181, 101, 118, 0.08);
  text-align: center;
  min-height: 380px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.round-info {
  font-size: 0.65rem;
  color: var(--rose);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  margin-bottom: 1.5rem;
}

.card-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.5rem;
  color: var(--dark);
  margin-bottom: 2rem;
}

.btn-group { display: flex; flex-direction: column; gap: 10px; }

button.game-btn {
  font-family: 'Montserrat', sans-serif;
  padding: 1.1rem;
  border-radius: 12px;
  border: 1px solid rgba(229, 152, 155, 0.1);
  background: #fff;
  color: var(--dark);
  font-size: 0.85rem;
  cursor: pointer;
  transition: all 0.2s;
}

button.game-btn:hover { background: var(--cream); border-color: var(--rose); }

button.primary { background: var(--deep-rose); color: white; border: none; margin-top: 1.5rem; font-weight: 500; }
button.primary:disabled { opacity: 0.2; }
button.selected { border-color: var(--deep-rose); background: rgba(181, 101, 118, 0.03); font-weight: 600; }

.question-box {
  font-family: 'Playfair Display', serif;
  font-size: 1.4rem;
  font-style: italic;
  color: var(--deep-rose);
  line-height: 1.6;
  margin-bottom: 2rem;
}

.instruction { font-size: 0.75rem; color: var(--rose); margin-top: 1rem; }

footer {
  text-align: center;
  margin-top: 4rem;
  font-size: 0.7rem;
  font-weight: 500;
  color: var(--deep-rose);
  letter-spacing: 0.2em;
}
</style>
</head>
<body>

<button id="sound-toggle" onclick="toggleAudio()">Music</button>

<div class="container">
  <header>
    <h1>The Distance Game</h1>
    <div class="subtitle">Closing the gap, one question at a time.</div>
  </header>

  <div class="names-row">
    <div class="name-input-wrap">
      <label>Player One</label>
      <input id="p1" type="text" placeholder="Babe" oninput="saveNames()">
    </div>
    <div class="name-input-wrap">
      <label>Player Two</label>
      <input id="p2" type="text" placeholder="Lindsie" oninput="saveNames()">
    </div>
  </div>

  <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>

  <div id="game-ui"></div>

  <footer>FOR LINDSIE WITH ALL MY LOVE</footer>
</div>

<audio id="bg-music" loop src="https://cdn.pixabay.com/audio/2021/09/06/audio_8c1b3e0e5f.mp3"></audio>

<script>
const POOL = [
  // Flirty / Physical (40%)
  "If I were lying next to you right now, what is the very first thing you’d do?",
  "What is the most attractive thing I've done without realizing it?",
  "What do you think about when you miss me in 'that' way?",
  "Describe exactly how you want me to kiss you the second we see each other next.",
  "What part of my body have you been thinking about the most today?",
  "What were you genuinely thinking the first time you saw me naked?",
  "What’s something you want me to do the next time I see you?",
  "What is a fantasy you’ve never told anyone else?",
  "What's a specific spot you want me to kiss you next time I see you?",
  "What shirt or hoodie of mine do you wish you were wearing tonight?",
  "What's something you've thought about doing with me but haven't suggested yet?",
  "What's something you want more of when we're together?",
  "When was the exact moment you realized the physical tension between us was real?",
  "What is your favorite way for me to touch you when we're just relaxing?",

  // Character / LDR / Vulnerability (60%)
  "If your friends had to describe your worst quality, what would they say?",
  "What's something you're secretly proud of but would never brag about?",
  "What's the pettiest thing you've ever done?",
  "When was the last time you had to admit you were genuinely wrong?",
  "What's a dream you've quietly given up on?",
  "What did you first notice about me that you'd never say unprompted?",
  "What do I do that you find secretly endearing but never mention?",
  "When did you first think 'okay, I actually really like this person'?",
  "What do you think about right before you fall asleep?",
  "What version of yourself are you still trying to become?",
  "What was the hardest part about the distance you never fully told me?",
  "What keeps you going when the distance feels impossible?",
  "What's the first 'boring' domestic thing you want to do when the distance is gone?",
  "What do you want us to still be doing when we're really old and creaky?",
  "What's something you're building right now that's partly for us?",
  "What would you want me to know if I ever see you at your worst?",
  "What do you need when you're struggling that you find hard to ask for?",
  "What is somewhere you've been imagining taking me?",
  "What's something you're scared to need from me?",
  "What's something about this relationship that surprised you?"
];

let currentRound = 0;
const totalRounds = 10;
let phase = 'pick-asker';
let asker = null;
let currentChoices = [];
let selectedQuestionIdx = null;

const shuffledPool = [...POOL].sort(() => Math.random() - 0.5);

function getName(id) { return document.getElementById(id).value.trim() || (id === 'p1' ? 'Babe' : 'Lindsie'); }
function saveNames() { if (phase === 'pick-asker') render(); }

function toggleAudio() {
  const audio = document.getElementById('bg-music');
  const btn = document.getElementById('sound-toggle');

  if (audio.paused) {
    audio.volume = 0.4; // softer by default
    audio.play();
    btn.style.opacity = "1";
    btn.innerText = "Music: On";
  } else {
    audio.pause();
    btn.style.opacity = "0.5";
    btn.innerText = "Music";
  }
}

function render() {
  const ui = document.getElementById('game-ui');
  const progress = document.getElementById('progress');
  progress.style.width = `${(currentRound / totalRounds) * 100}%`;

  if (currentRound >= totalRounds) {
    ui.innerHTML = `<div class="card"><div class="card-title">You're everything.</div><div class="question-box">Distance is just a test of how far love can travel. I love you, Lindsie.</div><button class="game-btn primary" onclick="location.reload()">Start Again</button></div>`;
    return;
  }

  if (phase === 'pick-asker') {
    ui.innerHTML = `
      <div class="card">
        <div class="round-info">Round ${currentRound + 1}</div>
        <div class="card-title">Who is asking?</div>
        <div class="btn-group">
          <button class="game-btn" onclick="setAsker(1)">${getName('p1')}</button>
          <button class="game-btn" onclick="setAsker(2)">${getName('p2')}</button>
        </div>
      </div>`;
  } else if (phase === 'pick-question') {
    ui.innerHTML = `
      <div class="card">
        <div class="round-info">Round ${currentRound + 1}</div>
        <div class="card-title">${asker === 1 ? getName('p1') : getName('p2')}, choose:</div>
        <div class="btn-group">
          <button class="game-btn ${selectedQuestionIdx === 0 ? 'selected' : ''}" onclick="selectQ(0)">${currentChoices[0]}</button>
          <button class="game-btn ${selectedQuestionIdx === 1 ? 'selected' : ''}" onclick="selectQ(1)">${currentChoices[1]}</button>
        </div>
        <button class="game-btn primary" onclick="confirmQ()" ${selectedQuestionIdx === null ? 'disabled' : ''}>Ask it</button>
      </div>`;
  } else if (phase === 'answer') {
    ui.innerHTML = `
      <div class="card">
        <div class="round-info">Round ${currentRound + 1}</div>
        <div class="question-box">"${currentChoices[selectedQuestionIdx]}"</div>
        <div class="instruction">${asker === 1 ? getName('p2') : getName('p1')} answers first, then ${asker === 1 ? getName('p1') : getName('p2')}.</div>
        <button class="game-btn primary" onclick="nextRound()">Next Round</button>
      </div>`;
  }
}

function setAsker(num) {
  asker = num;
  currentChoices = shuffledPool.slice(currentRound * 2, (currentRound * 2) + 2);
  phase = 'pick-question';
  render();
}
function selectQ(idx) { selectedQuestionIdx = idx; render(); }
function confirmQ() { phase = 'answer'; render(); }
function nextRound() { currentRound++; phase = 'pick-asker'; asker = null; selectedQuestionIdx = null; render(); }

render();
</script>
</body>
</html>
