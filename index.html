<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Distance Game: Intimate Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --rose: #e5989b;
  --deep-rose: #b56576;
  --gold: #dfb48c;
  --cream: #fffaf5;
  --dark: #352f36;
  --glass: rgba(255, 255, 255, 0.8);
  --shadow: 0 10px 30px rgba(181, 101, 118, 0.15);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--cream);
  background-image: 
    radial-gradient(at 0% 0%, rgba(229, 152, 155, 0.15) 0px, transparent 50%),
    radial-gradient(at 100% 100%, rgba(223, 180, 140, 0.15) 0px, transparent 50%);
  color: var(--dark);
  font-family: 'Montserrat', sans-serif;
  min-height: 100vh;
  padding: 2rem 1rem;
  line-height: 1.7;
}

.container { max-width: 600px; margin: 0 auto; }

/* ── HEADER ── */
header {
  text-align: center;
  margin-bottom: 3rem;
}

header h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2.2rem, 7vw, 3rem);
  color: var(--deep-rose);
  font-weight: 700;
  margin-bottom: 0.5rem;
  font-style: italic;
}

header .subtitle {
  font-size: 0.9rem;
  color: var(--rose);
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

/* ── PLAYER NAMES ── */
.names-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
  margin-bottom: 2rem;
}

.name-input-wrap {
  background: var(--glass);
  backdrop-filter: blur(5px);
  border: 1px solid rgba(229, 152, 155, 0.3);
  border-radius: 12px;
  padding: 0.8rem 1rem;
}

.name-input-wrap label {
  display: block;
  font-size: 0.65rem;
  font-weight: 600;
  color: var(--deep-rose);
  text-transform: uppercase;
  margin-bottom: 4px;
}

.name-input-wrap input {
  border: none;
  background: transparent;
  font-family: 'Montserrat', sans-serif;
  font-size: 1rem;
  font-weight: 500;
  color: var(--dark);
  width: 100%;
  outline: none;
}

/* ── PROGRESS ── */
.progress-bar {
  height: 3px;
  background: rgba(229, 152, 155, 0.2);
  border-radius: 10px;
  margin-bottom: 2rem;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--rose), var(--deep-rose));
  width: 0%;
  transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}

/* ── GAME CARDS ── */
.card {
  background: var(--glass);
  backdrop-filter: blur(10px);
  border: 1px solid white;
  border-radius: 24px;
  padding: 2.5rem 2rem;
  box-shadow: var(--shadow);
  animation: slideUp 0.5s ease-out;
  text-align: center;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.round-info {
  font-size: 0.75rem;
  color: var(--rose);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  margin-bottom: 1rem;
}

.card-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.8rem;
  color: var(--dark);
  margin-bottom: 2rem;
}

/* ── BUTTONS ── */
.btn-group {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

button {
  font-family: 'Montserrat', sans-serif;
  padding: 1.2rem;
  border-radius: 15px;
  border: 1px solid rgba(229, 152, 155, 0.3);
  background: white;
  color: var(--dark);
  font-size: 0.95rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  line-height: 1.4;
}

button:hover {
  border-color: var(--rose);
  background: var(--cream);
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(181, 101, 118, 0.1);
}

button.primary {
  background: var(--deep-rose);
  color: white;
  border: none;
  margin-top: 1.5rem;
}

button.primary:hover {
  background: #a05061;
}

button.selected {
  border-color: var(--deep-rose);
  background: rgba(181, 101, 118, 0.05);
  font-weight: 600;
}

/* ── QUESTION DISPLAY ── */
.question-box {
  background: white;
  padding: 2rem;
  border-radius: 20px;
  margin-bottom: 2rem;
  font-family: 'Playfair Display', serif;
  font-size: 1.4rem;
  font-style: italic;
  color: var(--deep-rose);
  line-height: 1.6;
  border: 1px solid rgba(229, 152, 155, 0.1);
}

.instruction {
  font-size: 0.85rem;
  color: var(--rose);
  margin-top: 1rem;
  font-style: italic;
}

footer {
  text-align: center;
  margin-top: 4rem;
  font-size: 0.7rem;
  color: var(--rose);
  letter-spacing: 0.1em;
}

</style>
</head>
<body>

<div class="container">
  <header>
    <h1>The Distance</h1>
    <div class="subtitle">A Ritual of Connection</div>
  </header>

  <div class="names-row">
    <div class="name-input-wrap">
      <label>Player One</label>
      <input id="p1" type="text" placeholder="Babe" oninput="saveNames()">
    </div>
    <div class="name-input-wrap">
      <label>Player Two</label>
      <input id="p2" type="text" placeholder="Love" oninput="saveNames()">
    </div>
  </div>

  <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>

  <div id="game-ui"></div>

  <footer>SOFTNESS &bull; INTIMACY &bull; TRUTH</footer>
</div>

<script>
// ── DATA ──
const ROUNDS = [
  { title: "Arrival", pairs: ["What was the first thing you noticed about me that you never told me?", "What is the most beautiful thing I’ve said to you recently?"] },
  { title: "The Tension", pairs: ["What part of my body have you been thinking about the most today?", "If we were in the same room right now, where would your hands be?"] },
  { title: "Softness", pairs: ["What is a way I can make you feel more safe and seen?", "When do you feel most 'at home' with me?"] },
  { title: "Heat", pairs: ["What is a fantasy you’ve had about me that felt 'too much' to say?", "Describe a time I looked at you and you felt it in your whole body."] },
  { title: "The Mind", pairs: ["What is an intellectual trait of mine that turns you on?", "What do you think is the most misunderstood part of your heart?"] },
  { title: "Physicality", pairs: ["What is your favorite way for me to touch you when we aren't being sexual?", "What is a 'forbidden' or 'new' thing you want to try with me next time we meet?"] },
  { title: "The Distance", pairs: ["How has being apart from me changed the way you love me?", "What is the hardest part about sleeping without me tonight?"] },
  { title: "Vulnerability", pairs: ["What is a secret about your body that you’re still learning to love?", "When was the last time I made you feel truly desired?"] },
  { title: "Desire", pairs: ["If you could have me do exactly one thing to you right now, what would it be?", "Describe the specific way you want me to kiss you when we reunite."] },
  { title: "The Future", pairs: ["What is one promise you want us to keep to each other's bodies?", "When we finally close the distance, what will be our first morning together look like?"] }
];

// ── STATE ──
let currentRound = 0;
let phase = 'pick-asker'; // pick-asker, pick-question, answer
let asker = null;
let selectedQuestionIdx = null;

function getName(id) {
  return document.getElementById(id).value.trim() || (id === 'p1' ? 'Player 1' : 'Player 2');
}

function saveNames() {
  if (phase === 'pick-asker') render();
}

function render() {
  const ui = document.getElementById('game-ui');
  const progress = document.getElementById('progress');
  progress.style.width = `${(currentRound / ROUNDS.length) * 100}%`;

  if (currentRound >= ROUNDS.length) {
    ui.innerHTML = `
      <div class="card">
        <div class="card-title">Full Circle</div>
        <div class="question-box">The distance is just space; this connection is the reality.</div>
        <button class="primary" onclick="location.reload()">Start Over</button>
      </div>`;
    return;
  }

  const round = ROUNDS[currentRound];

  if (phase === 'pick-asker') {
    ui.innerHTML = `
      <div class="card">
        <div class="round-info">Round ${currentRound + 1} of 10 &bull; ${round.title}</div>
        <div class="card-title">Who is asking this turn?</div>
        <div class="btn-group">
          <button onclick="setAsker(1)">${getName('p1')}</button>
          <button onclick="setAsker(2)">${getName('p2')}</button>
        </div>
      </div>`;
  } 
  
  else if (phase === 'pick-question') {
    ui.innerHTML = `
      <div class="card">
        <div class="round-info">${round.title}</div>
        <div class="card-title">${asker === 1 ? getName('p1') : getName('p2')}, choose your question:</div>
        <div class="btn-group">
          <button class="${selectedQuestionIdx === 0 ? 'selected' : ''}" onclick="selectQ(0)">${round.pairs[0]}</button>
          <button class="${selectedQuestionIdx === 1 ? 'selected' : ''}" onclick="selectQ(1)">${round.pairs[1]}</button>
        </div>
        <button class="primary" onclick="confirmQ()" ${selectedQuestionIdx === null ? 'disabled' : ''}>Ask this</button>
      </div>`;
  }

  else if (phase === 'answer') {
    ui.innerHTML = `
      <div class="card">
        <div class="round-info">${round.title}</div>
        <div class="question-box">"${round.pairs[selectedQuestionIdx]}"</div>
        <div class="instruction">
          ${asker === 1 ? getName('p2') : getName('p1')} answers first. <br>
          Then, ${asker === 1 ? getName('p1') : getName('p2')} answers.
        </div>
        <button class="primary" onclick="nextRound()">Next Round</button>
      </div>`;
  }
}

function setAsker(num) {
  asker = num;
  phase = 'pick-question';
  render();
}

function selectQ(idx) {
  selectedQuestionIdx = idx;
  render();
}

function confirmQ() {
  phase = 'answer';
  render();
}

function nextRound() {
  currentRound++;
  phase = 'pick-asker';
  asker = null;
  selectedQuestionIdx = null;
  render();
}

// ── INIT ──
render();
</script>

</body>
</html>
